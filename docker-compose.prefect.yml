###############################################################################
#  Prefect Pipeline — Docker Compose
#
#  Usage:
#    docker compose -f docker-compose.prefect.yml up --build
#
#  This brings up:
#    1. prefect-server — Dashboard + API at http://localhost:4200
#    2. mssql          — Microsoft SQL Server 2022 (Gold destination)
#    3. db-init        — One-shot: creates the DataCycle database
#    4. pipeline       — Long-running worker: waits for schedule / manual trigger
#    5. chat           — Chat agent web UI at http://localhost:8501
#
#  The pipeline runs daily at 06:00 UTC by default.  To trigger manually,
#  open http://localhost:4200 and click "Quick Run", or use the CLI:
#    docker compose -f docker-compose.prefect.yml exec pipeline \
#      prefect deployment run 'data-pipeline/daily-pipeline'
#
#  On Windows, replace  ./data  with  C:/Project/Data  if needed.
###############################################################################

services:

  # ── Prefect Server (dashboard + API) ────────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

  # ── SQL Server (Gold destination) ───────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Create the target database (runs once, then exits) ──────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    entrypoint: >
      /opt/mssql-tools18/bin/sqlcmd
        -S mssql -U sa -P "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}" -C
        -Q "IF DB_ID('DataCycle') IS NULL CREATE DATABASE DataCycle"
    restart: "no"

  # ── Pipeline (long-running worker) ──────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    depends_on:
      prefect-server:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    environment:
      PREFECT_API_URL:     http://prefect-server:4200/api
      DATA_DIR:            /app/data
      DB_SERVER:           mssql
      DB_NAME:             DataCycle
      DB_USER:             sa
      DB_PASSWORD:         "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
      OPENAI_API_KEY:      "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL:     "${OPENAI_BASE_URL:-}"
      OLLAMA_MODEL:        "${OLLAMA_MODEL:-}"
      USE_AI_ANALYSIS:     "${USE_AI_ANALYSIS:-false}"
      MARVIN_AGENT_MODEL:  "${MARVIN_AGENT_MODEL:-openai:gpt-4o-mini}"
      PIPELINE_CRON:       "${PIPELINE_CRON:-0 6 * * *}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # ── Chat Agent (web UI + API) ───────────────────────────────────────────
  chat:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    command: python -m agent.web
    depends_on:
      prefect-server:
        condition: service_started
    ports:
      - "8501:8501"
    environment:
      PREFECT_API_URL:     http://prefect-server:4200/api
      DATA_DIR:            /app/data
      OPENAI_API_KEY:      "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL:     "${OPENAI_BASE_URL:-}"
      OLLAMA_MODEL:        "${OLLAMA_MODEL:-}"
      MARVIN_AGENT_RETRIES: "${MARVIN_AGENT_RETRIES:-5}"
      MARVIN_AGENT_MODEL:  "${MARVIN_AGENT_MODEL:-openai:gpt-4o-mini}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  prefect_data:
  mssql_data:
